services:

  postgres:
    image: postgres:16-alpine
    container_name: vkursos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vkursos}
      POSTGRES_USER: ${POSTGRES_USER:-vkursos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vkursos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vkursos} -d ${POSTGRES_DB:-vkursos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vkursos-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vkursos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@vkursos.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vkursos-net

  redis:
    image: redis:7-alpine
    container_name: vkursos-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-vkursos}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vkursos}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vkursos-net

  minio:
    image: minio/minio:latest
    container_name: vkursos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vkursos-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:

networks:
  vkursos-net:
    driver: bridge